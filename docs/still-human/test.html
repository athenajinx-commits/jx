<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workforce Entry Examination — AI-CQ Test</title>
<meta name="description" content="The AI-CQ test: 24 situational-judgment questions measuring the six human faculties of 2045, scored on a 55–145 scale.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .exam-head { text-align: center; padding: 26px 0 6px; }
  .exam-head .seal { font-size: 2.4rem; }
  .exam-head .form-no { letter-spacing: .14em; text-transform: uppercase; font-size: .72rem; color: var(--muted); }
  .rules { display: grid; gap: 8px; padding-left: 20px; color: var(--ink-2); margin-top: 10px; }
  .certificate { position: relative; overflow: hidden; }
  .certificate .hero-num { color: var(--accent-ink); }
  .stamp {
    position: absolute; top: 22px; right: -34px; transform: rotate(35deg);
    font: 700 .72rem "Space Grotesk", sans-serif; letter-spacing: .12em;
    padding: 6px 44px; color: #fff;
  }
  .stamp.pass { background: var(--good); }
  .stamp.fail { background: var(--bad); }
  .band-line { font: 600 1.3rem "Space Grotesk", sans-serif; margin-top: 4px; }
  .clearance { margin-top: 6px; }
  .delta { font-size: .9rem; margin-top: 8px; }
  .delta .up { color: var(--good-text); font-weight: 600; }
  .delta .down { color: var(--bad); font-weight: 600; }
  .advice { border-left: 3px solid var(--accent); padding: 12px 16px; background: var(--chip); border-radius: 12px; margin-top: 10px; }
  .advice b { color: var(--ink); }
  section { margin-top: 34px; }
  details.tbl { margin-top: 12px; }
  details.tbl summary { cursor: pointer; color: var(--muted); font-size: .85rem; }
  .radar-axis-label { font: 500 12px system-ui, sans-serif; fill: var(--ink-2); }
  .radar-grid { fill: none; stroke: var(--grid); stroke-width: 1; }
  .radar-spoke { stroke: var(--grid); stroke-width: 1; }
  .radar-poly { fill: var(--accent); fill-opacity: .10; stroke: var(--accent); stroke-width: 2; stroke-linejoin: round; }
  .radar-dot { fill: var(--accent); stroke: var(--surface); stroke-width: 2; }
</style>
</head>
<body>
<div class="wrap">

  <nav class="nav">
    <a class="brand" href="./">Still Human<span class="dot">.</span>2045</a>
    <div class="links">
      <a href="./">Home</a>
      <a href="train.html">🎓 Centaur Academy</a>
      <a href="test.html" class="active">📋 Entry Exam</a>
      <a href="roadmap.html">🗺️ Roadmaps</a>
    </div>
  </nav>

  <main id="app"></main>

  <p class="footer-note">Series AICQ · the Oracle's counsel · a reading, not a ruling ·
    underprepared? <a href="train.html">the Academy is free</a></p>
</div>

<script src="data.js"></script>
<script>
"use strict";

const KEY = "stillHumanTest.v1";
function loadHist() { try { return JSON.parse(localStorage.getItem(KEY)) || { attempts: [] }; } catch { return { attempts: [] }; } }
function saveHist(h) { localStorage.setItem(KEY, JSON.stringify(h)); }

const dimById = Object.fromEntries(DIMENSIONS.map(d => [d.id, d]));
const app = document.getElementById("app");
const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;");

/* ---------------- intro ---------------- */
function intro() {
  const hist = loadHist();
  const last = hist.attempts.at(-1);
  app.innerHTML = `
  <div class="fade-in">
    <div class="exam-head">
      <div class="seal">🔮</div>
      <div class="form-no">${EXAM.form}</div>
      <h1>${EXAM.examName}</h1>
      <p style="max-width:600px;margin:12px auto 0">${EXAM.lore}</p>
    </div>
    <div class="spacer"></div>
    <div class="card">
      <h2>Examination rules</h2>
      <ol class="rules">
        <li><strong>24 situations</strong>, four per faculty — ${DIMENSIONS.map(d => d.name.toLowerCase()).join(", ")}. About 12 minutes.</li>
        <li>Every option is <strong>partially credited</strong> (0–3 points), like a situational-judgment test: some answers are wrong, some are decent, one is best.</li>
        <li>No feedback until the end — this is the exam, not the Academy. Answer as you would actually behave, not as you think you should.</li>
        <li>Your AI-CQ lands on a <strong>55–145</strong> scale. ${EXAM.passNote}</li>
      </ol>
      ${last ? `<p class="small" style="margin-top:14px">Previous attempt: <strong>${last.score}</strong> (${new Date(last.date).toLocaleDateString()}) — the Oracle remembers.</p>` : ""}
      <div class="spacer"></div>
      <button class="btn" id="start">Begin examination</button>
    </div>
  </div>`;
  document.getElementById("start").addEventListener("click", start);
}

/* ---------------- exam flow ---------------- */
let order, answers, at;

function start() {
  order = [...TEST_ITEMS.keys()].sort(() => Math.random() - 0.5);
  answers = new Array(TEST_ITEMS.length).fill(null);
  at = 0;
  ask();
}

function ask() {
  const item = TEST_ITEMS[order[at]];
  const opts = item.opts.map((o, i) => ({ ...o, i })).sort(() => Math.random() - 0.5);
  app.innerHTML = `
  <div class="fade-in">
    <div class="q-head">
      <span class="chip">📋 Question</span>
      <div class="meter" role="img" aria-label="Question ${at + 1} of ${order.length}">
        <i style="width:${Math.round(100 * at / order.length)}%"></i>
      </div>
      <span class="q-count">${at + 1} / ${order.length}</span>
    </div>
    <div class="q-scenario">${esc(item.q)}</div>
    <div class="opts">
      ${opts.map(o => `<button class="opt" data-i="${o.i}">${esc(o.t)}</button>`).join("")}
    </div>
    <div class="next-row" style="margin-top:18px">
      <button class="btn" id="next" disabled>${at + 1 === order.length ? "Submit examination" : "Next →"}</button>
    </div>
  </div>`;

  const next = document.getElementById("next");
  app.querySelectorAll(".opt").forEach(b => b.addEventListener("click", () => {
    app.querySelectorAll(".opt").forEach(x => x.classList.remove("picked"));
    b.classList.add("picked");
    answers[order[at]] = +b.dataset.i;
    next.disabled = false;
  }));
  next.addEventListener("click", () => {
    at++;
    if (at < order.length) ask(); else finish();
  });
}

/* ---------------- scoring ---------------- */
function finish() {
  let raw = 0;
  const perDim = {};
  DIMENSIONS.forEach(d => perDim[d.id] = { got: 0, max: 0 });
  TEST_ITEMS.forEach((item, i) => {
    const pts = item.opts[answers[i]].pts;
    raw += pts;
    perDim[item.dim].got += pts;
    perDim[item.dim].max += 3;
  });
  const score = AICQ.fromRaw(raw);

  const hist = loadHist();
  const prev = hist.attempts.at(-1);
  hist.attempts.push({ date: Date.now(), score, perDim: Object.fromEntries(DIMENSIONS.map(d => [d.id, perDim[d.id].got])) });
  if (hist.attempts.length > 20) hist.attempts = hist.attempts.slice(-20);
  saveHist(hist);

  results(score, perDim, prev);
}

/* ---------------- radar (single series: one hue, wash fill, dotted vertices, table twin below) ---------------- */
function radarSVG(perDim) {
  const cx = 240, cy = 160, R = 100;
  const pt = (i, r) => {
    const a = -Math.PI / 2 + i * Math.PI / 3;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  };
  const ring = f => "M" + [...Array(6).keys()].map(i => pt(i, R * f).map(n => n.toFixed(1)).join(",")).join("L") + "Z";
  const vals = DIMENSIONS.map(d => perDim[d.id].got / perDim[d.id].max);
  const poly = vals.map((v, i) => pt(i, Math.max(0.04, v) * R).map(n => n.toFixed(1)).join(",")).join(" ");
  const labels = DIMENSIONS.map((d, i) => {
    const [x, y] = pt(i, R + 22);
    const anchor = Math.abs(x - cx) < 8 ? "middle" : x > cx ? "start" : "end";
    return `<text class="radar-axis-label" x="${x.toFixed(1)}" y="${(y + 4).toFixed(1)}" text-anchor="${anchor}">${d.icon} ${d.name}</text>`;
  }).join("");
  return `
  <svg viewBox="0 0 480 320" style="width:100%;max-width:480px" role="img" aria-label="Skill profile radar chart; exact values in the table below">
    ${[0.25, 0.5, 0.75, 1].map(f => `<path class="radar-grid" d="${ring(f)}"/>`).join("")}
    ${[...Array(6).keys()].map(i => { const [x, y] = pt(i, R); return `<line class="radar-spoke" x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}"/>`; }).join("")}
    <polygon class="radar-poly" points="${poly}"/>
    ${vals.map((v, i) => { const [x, y] = pt(i, Math.max(0.04, v) * R); return `<circle class="radar-dot" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4"/>`; }).join("")}
    ${labels}
  </svg>`;
}

/* ---------------- results ---------------- */
function results(score, perDim, prev) {
  const band = AICQ.band(score);
  const passed = score >= EXAM.passScore;
  const sorted = [...DIMENSIONS].sort((a, b) => (perDim[a.id].got / perDim[a.id].max) - (perDim[b.id].got / perDim[b.id].max));
  const weakest = sorted.slice(0, 2);
  const strongest = sorted.at(-1);
  const delta = prev ? score - prev.score : null;

  app.innerHTML = `
  <div class="fade-in">
    <div class="card certificate center" style="padding:36px 22px">
      <div class="stamp ${passed ? "pass" : "fail"}">${passed ? "READY TO WORK" : "NOT YET"}</div>
      <div class="form-no" style="letter-spacing:.14em;text-transform:uppercase;font-size:.72rem;color:var(--muted)">
        ${EXAM.authority} · a reading, not a ruling</div>
      <p class="small" style="margin-top:14px">Your AI Collaboration Quotient</p>
      <div class="hero-num">${score}</div>
      <div class="band-line">${band.emoji} ${band.name}</div>
      <div class="clearance"><span class="chip ${passed ? "accent" : ""}">${band.clearance}</span></div>
      ${delta !== null ? `<div class="delta">vs. previous attempt:
        <span class="${delta > 0 ? "up" : delta < 0 ? "down" : ""}">${delta > 0 ? "+" : ""}${delta}</span></div>` : ""}
      <p style="max-width:560px;margin:16px auto 0">${band.blurb}</p>
    </div>

    <section>
      <h2>Your skill profile</h2>
      <div class="card">
        <div class="radar-wrap">${radarSVG(perDim)}</div>
        <div class="dim-bars" style="margin-top:10px">
          ${DIMENSIONS.map(d => {
            const p = perDim[d.id];
            const pct = Math.round(100 * p.got / p.max);
            return `<div class="dim-bar">
              <span class="name"><span>${d.icon}</span><span class="nm">${d.name}</span></span>
              <div class="track" role="img" aria-label="${d.name}: ${p.got} of ${p.max}"><i style="width:${pct}%"></i></div>
              <span class="val">${p.got}/${p.max}</span>
            </div>`;
          }).join("")}
        </div>
        <details class="tbl">
          <summary>View as table</summary>
          <table class="data" style="margin-top:8px">
            <thead><tr><th>Skill</th><th class="num">Points</th><th class="num">Percent</th></tr></thead>
            <tbody>${DIMENSIONS.map(d => { const p = perDim[d.id]; return `<tr><td>${d.icon} ${d.name}</td><td class="num">${p.got} / ${p.max}</td><td class="num">${Math.round(100 * p.got / p.max)}%</td></tr>`; }).join("")}</tbody>
          </table>
        </details>
      </div>
    </section>

    <section>
      <h2>The Oracle's guidance</h2>
      <p>Strongest skill: <strong>${strongest.icon} ${strongest.name}</strong>. ${esc(strongest.highTip)}</p>
      ${weakest.map(d => `<div class="advice"><b>${d.icon} ${d.name}</b> — ${esc(d.lowTip)}</div>`).join("")}
      <div class="spacer"></div>
      <div class="next-row" style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn" href="train.html">🎓 Train the weak spots</a>
        <button class="btn ghost" id="retake">Retake the exam</button>
      </div>
      <p class="small" style="margin-top:12px">The Oracle recommends at least a few Academy drills between attempts —
        retaking immediately mostly measures your memory of the questions.</p>
    </section>
  </div>`;

  document.getElementById("retake").addEventListener("click", start);
  window.scrollTo(0, 0);
}

/* #preview renders a sample result (random answers, nothing saved) — for styling checks and the curious */
if (location.hash === "#preview") {
  const perDim = {};
  DIMENSIONS.forEach(d => perDim[d.id] = { got: 0, max: 0 });
  let raw = 0;
  TEST_ITEMS.forEach(item => {
    const pts = item.opts[Math.floor(Math.random() * item.opts.length)].pts;
    raw += pts; perDim[item.dim].got += pts; perDim[item.dim].max += 3;
  });
  results(AICQ.fromRaw(raw), perDim, null);
} else {
  intro();
}
</script>
</body>
</html>
