<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Route Navigator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Toolbar ── */
#toolbar{background:#1e293b;border-bottom:1px solid #334155;padding:8px 14px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;z-index:100;flex-shrink:0}
#toolbar h1{font-size:15px;color:#38bdf8;margin-right:4px;white-space:nowrap}
.sep{width:1px;background:#334155;height:26px;margin:0 2px}
.btn{padding:5px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:filter .15s;white-space:nowrap}
.btn:hover{filter:brightness(1.15)}
.bp{background:#0ea5e9;color:#fff}.bs{background:#334155;color:#e2e8f0}
.bg{background:#10b981;color:#fff}.bw{background:#f59e0b;color:#fff}.br{background:#ef4444;color:#fff}
.zoom-lbl{font-size:11px;color:#94a3b8;min-width:44px;text-align:center}

/* ── Canvas ── */
#vp{flex:1;position:relative;overflow:hidden;background:#0f172a;background-image:radial-gradient(circle,#1e293b 1px,transparent 0);background-size:32px 32px;cursor:grab}
#vp.panning{cursor:grabbing}#vp.connecting{cursor:crosshair}
#world{position:absolute;width:6000px;height:5000px;transform-origin:0 0}
#svg-lines{position:absolute;top:0;left:0;width:6000px;height:5000px;overflow:visible;pointer-events:none}

/* ── Nodes ── */
.node{position:absolute;width:218px;background:#1e293b;border:2px solid #334155;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:border-color .2s,box-shadow .2s;z-index:10}
.node:hover{border-color:#38bdf8;box-shadow:0 4px 28px rgba(56,189,248,.2)}
.node.editing{border-color:#7dd3fc}

/* Node header */
.node-head{background:#0c4a6e;padding:7px 8px;border-radius:10px 10px 0 0;display:flex;align-items:center;gap:6px;cursor:move;user-select:none}
.drag-hdl{font-size:15px;flex-shrink:0;cursor:move}
/* View mode location */
.nloc-v{font-size:13px;font-weight:700;color:#e0f2fe;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Edit mode location */
.nloc-e{font-size:13px;font-weight:700;color:#e0f2fe;flex:1;outline:none;background:rgba(255,255,255,.08);border-radius:4px;padding:1px 5px;min-height:20px;word-break:break-word;cursor:text}
/* Edit toggle button */
.nedit{background:none;border:1px solid rgba(255,255,255,.2);color:#93c5fd;border-radius:5px;padding:2px 6px;font-size:11px;cursor:pointer;flex-shrink:0;transition:all .15s}
.nedit:hover{background:rgba(255,255,255,.15);color:#fff}

/* Node body – view mode */
.node-view{padding:7px 10px 4px}
.nv{display:flex;align-items:baseline;gap:5px;font-size:11.5px;color:#cbd5e1;margin-bottom:4px;line-height:1.3}
.nvi{font-size:11px;flex-shrink:0;width:15px;text-align:center}
.nv-txt{word-break:break-word}
.nv-dim{color:#475569;font-style:italic}
.nv-time{color:#94a3b8;margin-left:4px;font-size:11px}

/* Node body – edit mode */
.node-edit{padding:7px 10px 4px}
.nf{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.nfi{font-size:11px;flex-shrink:0;width:15px;text-align:center;color:#64748b}
.nf input{background:#0f172a;border:1px solid #334155;color:#cbd5e1;font-size:11.5px;padding:3px 6px;border-radius:4px;width:100%;outline:none;font-family:inherit}
.nf input:focus{border-color:#38bdf8;color:#e2e8f0}
.nf input::placeholder{color:#334155}

/* Action buttons */
.node-acts{display:flex;gap:4px;padding:5px 8px;border-top:1px solid #2d4a60}
.na{flex:1;padding:4px 3px;font-size:10px;border:none;border-radius:4px;cursor:pointer;font-weight:600;transition:filter .15s}
.na:hover{filter:brightness(1.2)}
.na-conn{background:#0ea5e9;color:#fff}.na-alt{background:#d97706;color:#fff}.na-del{background:#dc2626;color:#fff}

/* Port */
.node-port{width:14px;height:14px;background:#38bdf8;border-radius:50%;position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);cursor:pointer;pointer-events:all;border:2px solid #0f172a;z-index:20;transition:transform .15s,background .15s}
.node-port:hover{transform:translateX(-50%) scale(1.5);background:#7dd3fc}

/* ── Edge labels ── */
.elabel{position:absolute;background:#1e3a52;border:1px solid #334155;padding:3px 9px;border-radius:10px;font-size:11px;color:#93c5fd;cursor:text;outline:none;min-width:50px;text-align:center;z-index:30;pointer-events:all;white-space:nowrap}
.elabel:focus{border-color:#38bdf8;color:#e2e8f0;background:#0f172a}
.elabel.alt-lbl{border-color:#b45309;color:#fcd34d;background:#1c1400}
.elabel:empty::before{content:attr(data-ph);color:#475569;pointer-events:none}

/* Edge delete btn (shown on label hover) */
.edelbtn{position:absolute;width:18px;height:18px;background:#dc2626;color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;z-index:35;display:none;align-items:center;justify-content:center;font-weight:700;line-height:1;padding:0}
.edelbtn:hover{background:#b91c1c}

/* ── Preview line ── */
#preview-line{pointer-events:none;stroke:#38bdf8;stroke-width:2;stroke-dasharray:7 4;fill:none;opacity:.7}

/* ── Context menu ── */
#ctx{position:fixed;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:5px 0;box-shadow:0 12px 40px rgba(0,0,0,.6);z-index:1000;display:none;min-width:210px}
.ci{padding:8px 16px;cursor:pointer;font-size:12.5px;color:#e2e8f0;display:flex;align-items:center;gap:8px}
.ci:hover{background:#334155}
.ci.danger{color:#f87171}
.ci.unlink{color:#fbbf24}
.csep{height:1px;background:#334155;margin:4px 0}

/* ── Toast ── */
#toast{position:fixed;bottom:22px;right:22px;background:#059669;color:#fff;padding:9px 18px;border-radius:8px;font-size:12.5px;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}

/* ── Status bar ── */
#statusbar{background:#1e293b;border-top:1px solid #334155;padding:4px 14px;font-size:10.5px;color:#64748b;display:flex;gap:16px;flex-shrink:0}

/* ── Help tip ── */
#help-tip{position:absolute;bottom:10px;left:10px;background:rgba(30,41,59,.9);border:1px solid #334155;border-radius:8px;padding:7px 12px;font-size:10.5px;color:#64748b;pointer-events:none;z-index:5;line-height:1.7}
</style>
</head>
<body>

<div id="toolbar">
  <h1>✈ Travel Route Navigator</h1>
  <div class="sep"></div>
  <button class="btn bp" onclick="addNodeCentered()">＋ Add Stop</button>
  <div class="sep"></div>
  <button class="btn bs" onclick="exportJSON()">↑ Export JSON</button>
  <button class="btn bs" onclick="triggerImport()">↓ Import JSON</button>
  <input type="file" id="json-file-input" accept=".json" style="display:none" onchange="handleImportFile(this)">
  <div class="sep"></div>
  <button class="btn bg" onclick="downloadImage()">🖼 Image</button>
  <button class="btn bg" onclick="downloadPDF()">📄 PDF</button>
  <button class="btn bw" onclick="downloadItinerary()">📝 Itinerary</button>
  <div class="sep"></div>
  <button class="btn bs" onclick="zoomIn()">＋</button>
  <span class="zoom-lbl" id="zoom-lbl">100%</span>
  <button class="btn bs" onclick="zoomOut()">－</button>
  <button class="btn bs" onclick="resetView()" title="Reset view">⌖</button>
  <button class="btn bs" onclick="fitAll()" title="Fit to view">⊞</button>
  <div class="sep"></div>
  <button class="btn br" onclick="clearAll()">✕ Clear</button>
</div>

<div id="vp">
  <div id="world">
    <svg id="svg-lines" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0,10 3.5,0 7" fill="#38bdf8"/>
        </marker>
        <marker id="arr-alt" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/>
        </marker>
      </defs>
      <path id="preview-line" d=""/>
    </svg>
  </div>
  <div id="help-tip">
    Drag 📍 to move stop &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Drag background to pan<br>
    Click ✎ to edit stop &nbsp;·&nbsp; Right-click stop to unlink connections
  </div>
</div>

<div id="statusbar">
  <span id="st-nodes">0 stops</span>
  <span id="st-edges">0 connections</span>
  <span id="st-zoom">Zoom 100%</span>
</div>

<!-- Context menu (unlink items injected dynamically) -->
<div id="ctx">
  <div class="ci" id="ctx-conn">🔗 Connect to…</div>
  <div class="ci" id="ctx-alt">⤴ Add alternative route</div>
  <div class="csep" id="ctx-sep-unlink" style="display:none"></div>
  <!-- dynamic unlink items inserted here -->
  <div class="csep"></div>
  <div class="ci danger" id="ctx-del">🗑 Delete stop</div>
</div>

<div id="toast"></div>

<script>
/* ===========================
   STATE
=========================== */
const S = {
  nodes: [],  // {id,x,y,location,date,time,hotel,notes,_edit}
  edges: [],  // {id,from,to,label,type:'main'|'alt'}
  nid:1, eid:1,
  zoom:1, px:0, py:0,
  drag:null, pan:null, conn:null, ctxId:null,
};

const vp    = document.getElementById('vp');
const world = document.getElementById('world');
const svg   = document.getElementById('svg-lines');
const prv   = document.getElementById('preview-line');

/* ===========================
   TRANSFORM
=========================== */
function applyT() {
  world.style.transform = `translate(${S.px}px,${S.py}px) scale(${S.zoom})`;
  const pct = Math.round(S.zoom*100)+'%';
  document.getElementById('zoom-lbl').textContent = pct;
  document.getElementById('st-zoom').textContent  = 'Zoom '+pct;
}

function vpToWorld(cx,cy) {
  const r=vp.getBoundingClientRect();
  return {x:(cx-r.left-S.px)/S.zoom, y:(cy-r.top-S.py)/S.zoom};
}

/* ===========================
   NODES — VIEW / EDIT MODES
=========================== */
function addNodeAt(x,y,d={}) {
  const n = {id:'n'+(S.nid++), x,y,
    location:d.location||'New Location',
    date:d.date||'', time:d.time||'', hotel:d.hotel||'', notes:d.notes||'',
    _edit: false,
  };
  S.nodes.push(n);
  _renderNode(n);
  updateStatus();
  return n;
}

function addNodeCentered(d={}) {
  const off=S.nodes.length*22;
  return addNodeAt((vp.clientWidth/2-S.px)/S.zoom-109+off, (vp.clientHeight/2-S.py)/S.zoom-70+off, d);
}

/* Single function handles both initial render and re-render on mode toggle */
function _renderNode(n) {
  let el = document.getElementById('nd-'+n.id);
  const isNew = !el;
  if(isNew) {
    el = document.createElement('div');
    el.className = 'node';
    el.id = 'nd-'+n.id;
    world.appendChild(el);
  }
  el.style.left = n.x+'px';
  el.style.top  = n.y+'px';
  el.classList.toggle('editing', !!n._edit);

  if(n._edit) {
    el.innerHTML = `
      <div class="node-head">
        <span class="drag-hdl">📍</span>
        <div class="nloc-e" contenteditable="true" spellcheck="false">${esc(n.location)}</div>
        <button class="nedit" title="Save">✓</button>
      </div>
      <div class="node-edit">
        <div class="nf"><span class="nfi">📅</span><input type="text" placeholder="Date (e.g. Jun 1)" value="${esc(n.date)}" data-f="date"></div>
        <div class="nf"><span class="nfi">🕐</span><input type="text" placeholder="Time (e.g. 14:30)" value="${esc(n.time)}" data-f="time"></div>
        <div class="nf"><span class="nfi">🏨</span><input type="text" placeholder="Hotel / Accommodation" value="${esc(n.hotel)}" data-f="hotel"></div>
        <div class="nf"><span class="nfi">📝</span><input type="text" placeholder="Notes" value="${esc(n.notes)}" data-f="notes"></div>
      </div>
      <div class="node-acts">
        <button class="na na-conn">→ Connect</button>
        <button class="na na-alt">⤴ Alt</button>
        <button class="na na-del">✕</button>
      </div>
      <div class="node-port" id="pt-${n.id}"></div>`;
    /* Focus location */
    const loc = el.querySelector('.nloc-e');
    loc.addEventListener('input', ()=>{ n.location=loc.textContent.trim(); });
    /* Field bindings */
    el.querySelectorAll('input[data-f]').forEach(inp=>{
      inp.addEventListener('input', ()=>{ n[inp.dataset.f]=inp.value; });
      inp.addEventListener('change', ()=>renderEdges());
    });
    /* Focus first field */
    requestAnimationFrame(()=>loc.focus());
  } else {
    const dt   = [n.date, n.time ? `<span class="nv-time">🕐 ${esc(n.time)}</span>` : ''].filter(Boolean).join(' ');
    el.innerHTML = `
      <div class="node-head">
        <span class="drag-hdl">📍</span>
        <span class="nloc-v">${esc(n.location)}</span>
        <button class="nedit" title="Edit">✎</button>
      </div>
      <div class="node-view">
        ${dt ? `<div class="nv"><span class="nvi">📅</span><span class="nv-txt">${dt}</span></div>`
              : `<div class="nv nv-dim">No date / time set</div>`}
        ${n.hotel ? `<div class="nv"><span class="nvi">🏨</span><span class="nv-txt">${esc(n.hotel)}</span></div>`
                  : `<div class="nv nv-dim">No hotel set</div>`}
        ${n.notes ? `<div class="nv"><span class="nvi">📝</span><span class="nv-txt">${esc(n.notes)}</span></div>` : ''}
      </div>
      <div class="node-acts">
        <button class="na na-conn">→ Connect</button>
        <button class="na na-alt">⤴ Alt</button>
        <button class="na na-del">✕</button>
      </div>
      <div class="node-port" id="pt-${n.id}"></div>`;
    /* Double-click body to enter edit */
    el.querySelector('.node-view').addEventListener('dblclick', e=>{
      e.stopPropagation(); toggleEdit(n.id);
    });
  }

  _attachNodeEvents(n, el);
  return el;
}

function toggleEdit(id) {
  const n=S.nodes.find(n=>n.id===id); if(!n) return;
  n._edit=!n._edit;
  _renderNode(n);
  setTimeout(renderEdges, 30);
}

function _attachNodeEvents(n, el) {
  /* Drag from header / drag handle */
  el.querySelector('.node-head').addEventListener('mousedown', e=>{
    const t=e.target;
    if(t.tagName==='BUTTON') return;
    if(n._edit && t.classList.contains('nloc-e')) return;
    startDrag(n.id, e);
  });
  /* Drag from body background */
  el.addEventListener('mousedown', e=>{
    if(e.target.tagName==='INPUT'||e.target.contentEditable==='true'||
       e.target.tagName==='BUTTON'||e.target.classList.contains('node-port')||
       e.target.closest('.node-head')) return;
    startDrag(n.id, e);
  });
  /* Edit toggle button */
  el.querySelector('.nedit').addEventListener('click', e=>{ e.stopPropagation(); toggleEdit(n.id); });
  /* Context menu */
  el.addEventListener('contextmenu', e=>{ e.preventDefault(); showCtx(n.id, e.clientX, e.clientY); });
  /* Action buttons */
  el.querySelector('.na-conn').addEventListener('click', e=>{ e.stopPropagation(); startConn(n.id,'main'); });
  el.querySelector('.na-alt' ).addEventListener('click', e=>{ e.stopPropagation(); startConn(n.id,'alt'); });
  el.querySelector('.na-del' ).addEventListener('click', e=>{ e.stopPropagation(); deleteNode(n.id); });
  /* Port */
  el.querySelector('.node-port').addEventListener('click', e=>{ e.stopPropagation(); tryFinishConn(n.id); });
}

function deleteNode(id) {
  S.nodes=S.nodes.filter(n=>n.id!==id);
  S.edges=S.edges.filter(e=>e.from!==id&&e.to!==id);
  document.getElementById('nd-'+id)?.remove();
  renderEdges(); updateStatus();
}

function nodeEl(id){ return document.getElementById('nd-'+id); }

function nodePt(n,which='bottom') {
  const el=nodeEl(n.id), h=el?el.offsetHeight:120;
  if(which==='top')    return {x:n.x+109, y:n.y};
  if(which==='bottom') return {x:n.x+109, y:n.y+h};
  return {x:n.x+109, y:n.y+h/2};
}

/* ===========================
   DRAG
=========================== */
function startDrag(id,e) {
  e.stopPropagation();
  const n=S.nodes.find(n=>n.id===id); if(!n) return;
  S.drag={id, ox:(e.clientX-S.px)/S.zoom-n.x, oy:(e.clientY-S.py)/S.zoom-n.y};
  nodeEl(id).style.zIndex=100;
}

/* ===========================
   CONNECTIONS
=========================== */
function startConn(fromId,type) {
  S.conn={fromId,type}; vp.classList.add('connecting');
  toast(type==='alt'?'Click another stop to add alternative route…':'Click another stop to connect…');
}

function tryFinishConn(toId) {
  if(!S.conn||S.conn.fromId===toId){cancelConn();return;}
  addEdge(S.conn.fromId,toId,S.conn.type,'');
  cancelConn();
}

function cancelConn() {
  S.conn=null; vp.classList.remove('connecting'); prv.setAttribute('d','');
}

function addEdge(from,to,type='main',label='') {
  if(S.edges.find(e=>e.from===from&&e.to===to)){toast('Already connected');return;}
  const e={id:'e'+(S.eid++),from,to,label,type};
  S.edges.push(e); renderEdges(); updateStatus(); return e;
}

function deleteEdge(id) {
  S.edges=S.edges.filter(e=>e.id!==id); renderEdges(); updateStatus();
}

/* ===========================
   RENDER EDGES
=========================== */
function renderEdges() {
  svg.querySelectorAll('.ep').forEach(el=>el.remove());
  world.querySelectorAll('.elabel,.edelbtn').forEach(el=>el.remove());

  S.edges.forEach(edge=>{
    const fn=S.nodes.find(n=>n.id===edge.from), tn=S.nodes.find(n=>n.id===edge.to);
    if(!fn||!tn) return;
    const isAlt=edge.type==='alt';
    const from=nodePt(fn,'bottom'), to=nodePt(tn,'top');
    const dx=to.x-from.x, dy=to.y-from.y;
    const curve=Math.max(50,Math.abs(dy)*0.45);
    const cp1x=from.x+dx*0.05, cp1y=from.y+curve;
    const cp2x=to.x-dx*0.05,   cp2y=to.y-curve;
    const d=`M${from.x} ${from.y} C${cp1x} ${cp1y},${cp2x} ${cp2y},${to.x} ${to.y}`;

    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','ep');
    path.setAttribute('d',d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',isAlt?'#f59e0b':'#38bdf8');
    path.setAttribute('stroke-width',isAlt?'2':'2.5');
    if(isAlt) path.setAttribute('stroke-dasharray','9 5');
    path.setAttribute('marker-end',`url(#arr${isAlt?'-alt':''})`);
    path.style.pointerEvents='none';
    svg.appendChild(path);

    /* Label at midpoint of bezier (approx) */
    const mx=(from.x+to.x)/2, my=(from.y+to.y)/2;
    const lbl=document.createElement('div');
    lbl.className='elabel'+(isAlt?' alt-lbl':'');
    lbl.id='lbl-'+edge.id;
    lbl.contentEditable='true';
    lbl.dataset.ph=isAlt?'Alternative':'via…';
    lbl.textContent=edge.label||'';
    lbl.style.left=(mx-40)+'px';
    lbl.style.top =(my-13)+'px';
    lbl.addEventListener('input',()=>{ edge.label=lbl.textContent.trim(); });
    lbl.addEventListener('mousedown',e=>e.stopPropagation());
    world.appendChild(lbl);

    /* Delete button appears on label hover */
    const delbtn=document.createElement('button');
    delbtn.className='edelbtn';
    delbtn.textContent='×';
    delbtn.title='Unlink connection';
    delbtn.style.left=(mx+46)+'px';
    delbtn.style.top =(my-9)+'px';
    delbtn.style.position='absolute';
    delbtn.addEventListener('click',e=>{ e.stopPropagation(); deleteEdge(edge.id); });
    world.appendChild(delbtn);

    const show=()=>delbtn.style.display='flex';
    const hide=()=>delbtn.style.display='none';
    lbl.addEventListener('mouseenter',show);
    lbl.addEventListener('mouseleave',hide);
    delbtn.addEventListener('mouseenter',show);
    delbtn.addEventListener('mouseleave',hide);
  });
}

/* ===========================
   PAN & ZOOM
=========================== */
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.9;
  const r=vp.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  S.px=mx-(mx-S.px)*f; S.py=my-(my-S.py)*f;
  S.zoom=Math.max(0.15,Math.min(3,S.zoom*f)); applyT();
},{passive:false});

vp.addEventListener('mousedown',e=>{
  const onBg=e.target===vp||e.target===world||e.target===svg;
  if(onBg&&S.conn){cancelConn();return;}
  if(onBg){S.pan={sx:e.clientX-S.px,sy:e.clientY-S.py};vp.classList.add('panning');}
});

document.addEventListener('mousemove',e=>{
  if(S.drag){
    const n=S.nodes.find(n=>n.id===S.drag.id);
    if(n){
      n.x=(e.clientX-S.px)/S.zoom-S.drag.ox;
      n.y=(e.clientY-S.py)/S.zoom-S.drag.oy;
      const el=nodeEl(n.id);
      if(el){el.style.left=n.x+'px';el.style.top=n.y+'px';}
      renderEdges();
    }
  } else if(S.pan){
    S.px=e.clientX-S.pan.sx; S.py=e.clientY-S.pan.sy; applyT();
  } else if(S.conn){
    const fn=S.nodes.find(n=>n.id===S.conn.fromId);
    if(fn){
      const from=nodePt(fn,'bottom'), pt=vpToWorld(e.clientX,e.clientY);
      prv.setAttribute('d',`M${from.x} ${from.y} L${pt.x} ${pt.y}`);
      prv.setAttribute('stroke',S.conn.type==='alt'?'#f59e0b':'#38bdf8');
    }
  }
});

document.addEventListener('mouseup',e=>{
  if(S.drag){nodeEl(S.drag.id)?.style.removeProperty('z-index');S.drag=null;}
  if(S.pan){S.pan=null;vp.classList.remove('panning');}
});

vp.addEventListener('click',e=>{
  if(!S.conn) return;
  const nd=e.target.closest('.node');
  if(nd) tryFinishConn(nd.id.replace('nd-',''));
  else cancelConn();
});

document.addEventListener('click',e=>{
  if(!document.getElementById('ctx').contains(e.target)) hideCtx();
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ cancelConn(); hideCtx(); }
});

/* ===========================
   ZOOM CONTROLS
=========================== */
function zoomIn()    {S.zoom=Math.min(3,S.zoom*1.2);applyT();}
function zoomOut()   {S.zoom=Math.max(0.15,S.zoom/1.2);applyT();}
function resetView() {S.zoom=1;S.px=0;S.py=0;applyT();}
function fitAll() {
  if(!S.nodes.length) return;
  const xs=S.nodes.map(n=>n.x), ys=S.nodes.map(n=>n.y);
  const x1=Math.min(...xs)-50, y1=Math.min(...ys)-50;
  const x2=Math.max(...xs)+270, y2=Math.max(...ys)+200;
  const w=x2-x1, h=y2-y1;
  S.zoom=Math.min(vp.clientWidth/w, vp.clientHeight/h, 1.5);
  S.px=(vp.clientWidth -w*S.zoom)/2-x1*S.zoom;
  S.py=(vp.clientHeight-h*S.zoom)/2-y1*S.zoom;
  applyT();
}

/* ===========================
   CONTEXT MENU — with dynamic unlink items
=========================== */
function showCtx(id,x,y) {
  S.ctxId=id;
  const m=document.getElementById('ctx');

  /* Remove previous dynamic unlink items */
  m.querySelectorAll('.ci.unlink,.csep.dyn').forEach(el=>el.remove());
  document.getElementById('ctx-sep-unlink').style.display='none';

  /* Build unlink items for this node's edges */
  const connected=S.edges.filter(e=>e.from===id||e.to===id);
  if(connected.length){
    document.getElementById('ctx-sep-unlink').style.display='block';
    const anchor=document.getElementById('ctx-sep-unlink');
    connected.forEach(edge=>{
      const otherId=edge.from===id?edge.to:edge.from;
      const other=S.nodes.find(n=>n.id===otherId);
      const dir=edge.from===id?'→':'←';
      const item=document.createElement('div');
      item.className='ci unlink';
      item.innerHTML=`🔗 Unlink ${dir} <b style="color:#fff;font-weight:600">${esc(other?.location||'?')}</b>`;
      item.addEventListener('click',()=>{ hideCtx(); deleteEdge(edge.id); });
      anchor.insertAdjacentElement('afterend',item);
    });
  }

  /* Position and show */
  const mW=220, mH=m.querySelectorAll('.ci').length*36+20;
  const winW=window.innerWidth, winH=window.innerHeight;
  m.style.left=Math.min(x,winW-mW-10)+'px';
  m.style.top =Math.min(y,winH-mH-10)+'px';
  m.style.display='block';
}
function hideCtx(){ document.getElementById('ctx').style.display='none'; }

/* Wire static context menu items */
document.getElementById('ctx-conn').addEventListener('click',()=>{ hideCtx(); startConn(S.ctxId,'main'); });
document.getElementById('ctx-alt' ).addEventListener('click',()=>{ hideCtx(); startConn(S.ctxId,'alt'); });
document.getElementById('ctx-del' ).addEventListener('click',()=>{ hideCtx(); deleteNode(S.ctxId); });

/* ===========================
   IMPORT / EXPORT
=========================== */
function exportJSON() {
  const data={
    nodes:S.nodes.map(n=>({...n,_edit:undefined})),
    edges:S.edges.map(e=>({...e})),
    nid:S.nid, eid:S.eid,
  };
  dlContent('travel-route.json', JSON.stringify(data,null,2), 'application/json');
  toast('Route exported!');
}

function triggerImport() {
  document.getElementById('json-file-input').click();
}

function handleImportFile(input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const data=JSON.parse(e.target.result);
      _loadData(data);
      toast('Route imported!');
      fitAll();
    } catch(err){ alert('Invalid JSON: '+err.message); }
  };
  reader.readAsText(file);
  input.value=''; /* reset so same file can be re-imported */
}

function _loadData(data) {
  _clearWorld();
  S.nid=data.nid||S.nid; S.eid=data.eid||S.eid;
  (data.nodes||[]).forEach(n=>{ n._edit=false; S.nodes.push(n); _renderNode(n); });
  (data.edges||[]).forEach(e=>S.edges.push(e));
  renderEdges(); updateStatus();
}

function clearAll() {
  if(!confirm('Clear all stops and connections?')) return;
  _clearWorld(); updateStatus();
}

function _clearWorld() {
  S.nodes=[]; S.edges=[]; S.nid=1; S.eid=1;
  world.querySelectorAll('.node,.elabel,.edelbtn').forEach(el=>el.remove());
  svg.querySelectorAll('.ep').forEach(el=>el.remove());
}

/* ===========================
   DOWNLOADS
=========================== */
function dlContent(name,content,type) {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

function downloadItinerary() {
  const sorted=[...S.nodes].sort((a,b)=>a.y-b.y);
  let txt='╔══════════════════════════════╗\n║     TRAVEL ITINERARY          ║\n╚══════════════════════════════╝\n\n';
  sorted.forEach((n,i)=>{
    txt+=`Stop ${i+1}: ${n.location}\n`;
    if(n.date)  txt+=`  Date  : ${n.date}\n`;
    if(n.time)  txt+=`  Time  : ${n.time}\n`;
    if(n.hotel) txt+=`  Hotel : ${n.hotel}\n`;
    if(n.notes) txt+=`  Notes : ${n.notes}\n`;
    const me=S.edges.find(e=>e.from===n.id&&e.type==='main');
    if(me&&i<sorted.length-1) txt+=`  ──────\n  → ${me.label||'(connection)'}\n`;
    txt+='\n';
  });
  const alts=S.edges.filter(e=>e.type==='alt');
  if(alts.length){
    txt+='──────────────────────────────\nALTERNATIVE ROUTES\n──────────────────────────────\n';
    alts.forEach(e=>{
      const f=S.nodes.find(n=>n.id===e.from), t=S.nodes.find(n=>n.id===e.to);
      if(f&&t) txt+=`  ${f.location} → ${t.location}${e.label?' ('+e.label+')':''}\n`;
    });
  }
  dlContent('itinerary.txt', txt, 'text/plain');
  toast('Itinerary downloaded!');
}

/* ===========================
   CAPTURE — clone into exact-sized div
   so html2canvas captures ALL stops at full resolution
=========================== */
function _bounds(pad=70) {
  if(!S.nodes.length) return {x:0,y:0,w:800,h:600,offX:0,offY:0};
  const els = S.nodes.map(n=>nodeEl(n.id)).filter(Boolean);
  const xs=S.nodes.map(n=>n.x), ys=S.nodes.map(n=>n.y);
  const x1=Math.min(...xs)-pad, y1=Math.min(...ys)-pad;
  const x2=Math.max(...S.nodes.map((n,i)=>n.x+(els[i]?els[i].offsetWidth:218)))+pad;
  const y2=Math.max(...S.nodes.map((n,i)=>n.y+(els[i]?els[i].offsetHeight:140)))+pad;
  return {x:x1,y:y1,w:x2-x1,h:y2-y1,offX:x1,offY:y1};
}

async function buildCaptureDiv() {
  const b=_bounds();

  const cap=document.createElement('div');
  cap.style.cssText=`position:fixed;left:0;top:-${b.h+200}px;width:${b.w}px;height:${b.h}px;background:#0f172a;overflow:hidden`;
  document.body.appendChild(cap);

  /* SVG lines — shift coordinate space via viewBox */
  const svgClone=svg.cloneNode(true);
  svgClone.setAttribute('viewBox',`${b.offX} ${b.offY} ${b.w} ${b.h}`);
  svgClone.style.cssText=`position:absolute;top:0;left:0;width:${b.w}px;height:${b.h}px;overflow:visible;pointer-events:none`;
  svgClone.querySelector('#preview-line')?.remove();
  cap.appendChild(svgClone);

  /* Nodes — shift positions */
  S.nodes.forEach(n=>{
    const orig=nodeEl(n.id); if(!orig) return;
    const clone=orig.cloneNode(true);
    clone.id='';
    clone.style.left=(n.x-b.offX)+'px';
    clone.style.top =(n.y-b.offY)+'px';
    clone.style.zIndex='';
    clone.style.position='absolute';
    /* Make edit buttons invisible in capture */
    clone.querySelectorAll('.nedit').forEach(btn=>btn.style.visibility='hidden');
    cap.appendChild(clone);
  });

  /* Edge labels — shift positions */
  world.querySelectorAll('.elabel').forEach(lbl=>{
    const clone=lbl.cloneNode(true);
    clone.id='';
    clone.style.left=(parseFloat(lbl.style.left)-b.offX)+'px';
    clone.style.top =(parseFloat(lbl.style.top) -b.offY)+'px';
    cap.appendChild(clone);
  });

  return cap;
}

async function captureCanvas() {
  if(!window.html2canvas){ toast('html2canvas not loaded'); return null; }
  const cap=await buildCaptureDiv();
  /* Let browser paint the cloned div */
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  try {
    const cvs=await html2canvas(cap,{
      backgroundColor:'#0f172a', scale:2,
      useCORS:true, allowTaint:true, logging:false,
    });
    return cvs;
  } finally {
    document.body.removeChild(cap);
  }
}

async function downloadImage() {
  toast('Generating image…');
  try {
    const cvs=await captureCanvas(); if(!cvs) return;
    const a=document.createElement('a');
    a.download='travel-route.png'; a.href=cvs.toDataURL('image/png'); a.click();
    toast('Image downloaded!');
  } catch(e){ toast('Error: '+e.message); console.error(e); }
}

async function downloadPDF() {
  toast('Generating PDF…');
  try {
    const cvs=await captureCanvas(); if(!cvs) return;
    const {jsPDF}=window.jspdf;
    const pw=cvs.width/2, ph=cvs.height/2;
    const orient=pw>ph?'landscape':'portrait';
    const pdf=new jsPDF({orientation:orient,unit:'px',format:[pw,ph]});
    pdf.addImage(cvs.toDataURL('image/png'),'PNG',0,0,pw,ph);
    pdf.save('travel-route.pdf');
    toast('PDF downloaded!');
  } catch(e){ toast('Error: '+e.message); console.error(e); }
}

/* ===========================
   UTILS
=========================== */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function updateStatus() {
  const ns=S.nodes.length,es=S.edges.length;
  document.getElementById('st-nodes').textContent=ns+' stop'+(ns!==1?'s':'');
  document.getElementById('st-edges').textContent=es+' connection'+(es!==1?'s':'');
}

let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2600);
}
